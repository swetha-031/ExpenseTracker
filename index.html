<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Login - Expense Tracker</title>
  <style>
    body {
      background: linear-gradient(90deg, #f9f9f9 60%, #d6f5e3 100%);
      font-family: Arial, sans-serif;
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding-top: 80px;
    }
    .container {
      background: #fff;
      max-width: 360px;
      width: 90%;
      padding: 40px 30px;
      border-radius: 16px;
      box-shadow: 0 8px 32px rgba(20, 96, 77, 0.10);
      box-sizing: border-box;
      text-align: center;
    }
    h2 {
      color: #189d66;
      margin-bottom: 32px;
      font-size: 2rem;
      font-weight: 700;
      text-align: center;
    }
    input[type="email"],
    input[type="password"] {
      width: 100%;
      padding: 14px 12px;
      margin: 0 0 18px 0;
      font-size: 1rem;
      border: 1px solid #c5e7d6;
      border-radius: 8px;
      box-sizing: border-box;
      outline-offset: 2px;
      transition: border-color 0.2s;
    }
    input[type="email"]:focus,
    input[type="password"]:focus {
      border-color: #189d66;
    }
    button {
      width: 100%;
      padding: 14px;
      margin-top: 12px;
      border-radius: 8px;
      border: none;
      font-weight: 700;
      font-size: 1.1rem;
      background: #189d66;
      color: #fff;
      cursor: pointer;
      transition: background-color 0.3s;
    }
    button:hover {
      background: #176e4f;
    }
    p {
      margin-top: 24px;
      font-size: 1rem;
      color: #555;
    }
    a {
      color: #189d66;
      font-weight: 700;
      text-decoration: none;
    }
    a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>Login</h2>
    <input type="email" id="login-email" placeholder="Email" />
    <input type="password" id="login-password" placeholder="Password" />
    <button id="login-btn">Login</button>
    <p>Don't have an account? <a href="register.html">Register</a></p>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyB9nMScTfZ-1x1URK_u97cPE96nlOU-zvw",
      authDomain: "expense-tracker-afc24.firebaseapp.com",
      projectId: "expense-tracker-afc24",
      storageBucket: "expense-tracker-afc24.firebasestorage.app",
      messagingSenderId: "83941365376",
      appId: "1:83941365376:web:6d7952bb0dc1f37fc9b865"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    document.getElementById("login-btn").addEventListener("click", () => {
      const email = document.getElementById("login-email").value;
      const password = document.getElementById("login-password").value;

      signInWithEmailAndPassword(auth, email, password)
        .then(() => {
          alert("✅ Login successful!");
          window.location.href = "dashboard.html";
        })
        .catch(err => alert("Login Failed: " + err.message));
    });
  </script>
</body>
</html>

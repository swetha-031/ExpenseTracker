<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dashboard - Expense Tracker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <img id="profile-pic" alt="Profile">
    <span id="profile-name"></span>
    <button onclick="logout()">Logout</button>
  </header>
  <main>
    <iframe src="tracker.html" width="100%" height="600px" style="border:none;"></iframe>
  </main>

  <!-- Expense Summary -->
  <p>Total: <span id="total-amount">0</span></p>
  <p>Balance: <span id="balance-amount">0</span></p>
  <p id="notification"></p>

  <!-- Search -->
  <input type="text" id="search-input" placeholder="Search by Category">

  <!-- Charts -->
  <canvas id="bar-chart"></canvas>
  <canvas id="expense-chart"></canvas>

  <!-- Email Reminder -->
  <h3>Email Reminder</h3>
  <input type="email" id="user-email" placeholder="Enter your email">
  <select id="reminder-type">
    <option value="daily">Daily</option>
    <option value="weekly">Weekly</option>
  </select>
  <button id="send-reminder">Send Reminder</button>
  <p id="email-status"></p>

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <!-- EmailJS -->
  <script src="https://cdn.jsdelivr.net/npm/emailjs-com@2/dist/email.min.js"></script>
  <!-- Firebase & App Logic -->
  <script type="module" src="5.js"></script>
</body>
</html>
